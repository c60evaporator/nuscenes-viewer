name: CD

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

# 並行実行を抑止（重なるとVPCエンドポイントのapply/destroyが競合して孤児が残るため）
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

jobs:
  # ----------------------------------------------------------------
  # 変更検知
  # ----------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # ----------------------------------------------------------------
  # バックエンド CD
  # ----------------------------------------------------------------
  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Start VPC endpoints (terraform/deploy apply)
        working-directory: terraform/deploy
        run: |
          terraform init -upgrade

          # 前回実行のdestroy未完走などでVPCに残存しているECRエンドポイントがあれば
          # stateにimportして取り込む（ローカルstateは実行ごとに消えるため自己治癒が必要）
          TF_VARS='-var=region=${{ env.AWS_REGION }} -var=project_name=${{ env.PROJECT_NAME }} -var=multi_az=false'
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=${{ env.PROJECT_NAME }}-vpc" \
            --query 'Vpcs[0].VpcId' --output text)
          for pair in "ecr_dkr:ecr.dkr" "ecr_api:ecr.api"; do
            res="${pair%%:*}"; svc="${pair##*:}"
            ep=$(aws ec2 describe-vpc-endpoints \
              --filters "Name=vpc-id,Values=$VPC_ID" \
                        "Name=service-name,Values=com.amazonaws.${{ env.AWS_REGION }}.$svc" \
                        "Name=vpc-endpoint-state,Values=available,pending" \
              --query 'VpcEndpoints[0].VpcEndpointId' --output text)
            if [ "$ep" != "None" ] && [ -n "$ep" ]; then
              echo "Importing existing $svc endpoint: $ep"
              terraform import $TF_VARS "aws_vpc_endpoint.$res" "$ep"
            fi
          done

          terraform apply -auto-approve $TF_VARS

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REPO: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build \
            --platform linux/amd64 \
            --target production \
            -t $ECR_REPO/${{ env.PROJECT_NAME }}/backend:latest \
            -f backend/Dockerfile \
            ./backend
          docker push $ECR_REPO/${{ env.PROJECT_NAME }}/backend:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --service ${{ env.PROJECT_NAME }}-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} \
            --no-cli-pager

      - name: Wait for ECS deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --services ${{ env.PROJECT_NAME }}-service \
            --region ${{ env.AWS_REGION }}

      - name: Stop VPC endpoints (terraform/deploy destroy)
        if: always()
        working-directory: terraform/deploy
        run: |
          terraform destroy -auto-approve \
            -var="region=${{ env.AWS_REGION }}" \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="multi_az=false"

  # ----------------------------------------------------------------
  # フロントエンド CD
  # ----------------------------------------------------------------
  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy index.html (no-cache)
        run: |
          aws s3 cp ./frontend/dist/index.html \
            s3://${{ env.PROJECT_NAME }}-static/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --region ${{ env.AWS_REGION }}

      - name: Deploy assets (long-term cache)
        run: |
          aws s3 sync ./frontend/dist \
            s3://${{ env.PROJECT_NAME }}-static \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete \
            --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --no-cli-pager
