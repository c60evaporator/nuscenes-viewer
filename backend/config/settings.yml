# ──────────────────────────────────────────────────────────────────────────────
# NuScenes Viewer バックエンド設定ファイル
#
# このファイルのパスは環境変数 APP_CONFIG_PATH で上書き可能です。
# デフォルト: /app/config/settings.yml
# ──────────────────────────────────────────────────────────────────────────────

# マップ原点（南西端、WGS84 形式: lat/lon）
# ローカル座標 (x, y)[m] → WGS84 (lon, lat) 変換の基準点として使用します。
# 新しいロケーションを追加する場合はここに追記してください。
map_origins:

  # ── 標準 NuScenes ロケーション ──────────────────────────────────────────────
  boston-seaport:
    lat: 42.336849169438615
    lon: -71.05785369873047

  singapore-onenorth:
    lat: 1.2882100888758645
    lon: 103.78475189208984

  singapore-hollandvillage:
    lat: 1.2993652317780957
    lon: 103.78252056121826

  singapore-queenstown:
    lat: 1.2782562240223188
    lon: 103.76741409301758

  # ── CARLA シミュレーションマップ ─────────────────────────────────────────────
  # 実在の GPS 座標はありません。地図表示位置を調整する場合は lat/lon を変更してください。
  Town10HD_Opt:
    lat: 0.0
    lon: 0.0
