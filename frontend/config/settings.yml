# frontend/src/config/settings.ts に同じ値を反映すること

map_projection:
  max_distance_m: 75  # カメラ画像上に表示するフィーチャーの最大距離（自車からの地面2D距離、メートル）

layer_display_order:  # 下から上への描画順。後に記載したレイヤーが前面に描画される
  - drivable_area     # 最も広い領域（最下層）
  - road_segment      # 連続する道路セグメント
  - road_block        # road_segment を含む広域ブロック
  - carpark_area      # 駐車場
  - walkway           # 歩道
  - ped_crossing      # 歩行者横断歩道
  - stop_line         # 停止線
  - lane_connector    # 交差点内の接続レーン
  - lane              # 個別走行レーン（road_segment より上層）
  - road_divider      # 道路分離帯（ライン系）
  - lane_divider      # 車線分離帯（ライン系）
  - traffic_light     # 信号機（ポイント系・最上層）

annotation:
  # Edit BBox 中、元位置のBBoxの不透明度 (0.0=完全透明, 1.0=完全不透明)
  editing_original_opacity: 0.3
  # 左ペインCategoryフィルタ、左ペインInstanceリストおよび右ペインプルダウンメニューにおけるCategoryの表示順序。上に記載したカテゴリが先に来る
  category_order:
    - vehicle.car
    - vehicle.bicycle
    - vehicle.motorcycle
    - vehicle.emergency.ambulance
    - vehicle.emergency.police
    - vehicle.bus.rigid
    - vehicle.truck
    - vehicle.trailer
    - human.pedestrian.adult
    - human.pedestrian.child
    - human.pedestrian.construction_worker
    - human.pedestrian.police_officer
    - animal
  # BBoxのCategoryに応じたデフォルトサイズ
  default_bbox_sizes:
    animal: [1.0, 1.0, 1.0]  # 動物のデフォルトのBBoxサイズ (幅, 長さ, 高さ) 単位はメートル
    human: [0.5, 0.5, 1.7]   # 人のデフォルトのBBoxサイズ (幅, 長さ, 高さ) 単位はメートル
    movable_object: [1.0, 1.0, 1.0]  # その他の移動物体のデフォルトのBBoxサイズ (幅, 長さ, 高さ) 単位はメートル
    vehicle.bicycle: [0.5, 1.8, 1.0]  # 自転車のデフォルトのBBoxサイズ (幅, 長さ, 高さ) 単位はメートル
    vehicle.motorcycle: [0.8, 2.0, 1.2]  # バイクのデフォルトのBBoxサイズ (幅, 長さ, 高さ) 単位はメートル
    vehicle.car: [1.8, 4.5, 1.5]  # 車のデフォルトのBBoxサイズ (幅, 長さ, 高さ) 単位はメートル
    vehicle.emergency.ambulance: [2.0, 5.0, 1.8]  # 緊急車両のデフォルトのBBoxサイズ (幅, 長さ, 高さ) 単位はメートル
    vehicle.emergency.police: [2.0, 5.0, 1.8]  # 緊急車両のデフォルトのBBoxサイズ (幅, 長さ, 高さ) 単位はメートル
    vehicle.bus: [2.5, 12.0, 3.5]  # バスのデフォルトのBBoxサイズ (幅, 長さ, 高さ) 単位はメートル
    vehicle.truck: [2.5, 8.0, 3.5]  # トラックのデフォルトのBBoxサイズ (幅, 長さ, 高さ) 単位はメートル
    vehicle.trailer: [2.5, 12.0, 3.5]  # トレーラーのデフォルトのBBoxサイズ (幅, 長さ, 高さ) 単位はメートル
  # translation外挿線形補完のタイムスタンプの最大許容差 (秒)。この値を超えると、外挿補間は行われず、最も近いフレームの値が使用される
  translation_extrapolation_max: 2.0
  # Add BBoxデフォルト位置のegoからの前方距離 (m)
  default_forward_distance: 5.0
  # 地面高さ検出用パラメータ
  ground_height_detection:
    lower_margin: 1.0  # 地面高さ検出用の点群の下側しきい値（-LiDAR高さ-lower_marginよりもzが大きい点群が対象に） (m)
    upper_margin: 1.0  # 地面高さ検出用の点群の上側しきい値（-LiDAR高さ+upper_marginよりもzが小さい点群が対象に） (m)
    search_radii: [2.0, 4.0, 6.0]  # 地面高さ検出用の点群のtargetXYからの検索半径 (m)。bin_ratio_thresh, min_points, max_deviationの条件を満たす最小半径が採用される
    bin_size: 0.1  # ヒストグラムビン幅 (m)
    refine_half_width: 0.2  # ヒストグラムビンの中央値を求める際の精密化範囲 (m)
    min_points: 20  # 有効とみなす最小点群数
    max_deviation: 1.0  # priorからの最大許容乖離 (m)

waypoints:
  scene_waypoint_size: 6.0   # Scene画面のwaypointの表示サイズ（点の半径px、地図画像幅3000px基準。Start/Endは1.5倍）
  sample_waypoint_size: 4.0  # Sample画面、Instance画面、Annotation画面のwaypointの表示サイズ（点の半径px、地図画像幅3000px基準）
